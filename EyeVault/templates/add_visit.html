<!DOCTYPE html>
<html>
<head>
    <title>Add Patient Visit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">
            🏥 EyeVault - Patient Visit
        </span>
    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="text-center mb-4">
                        📝 Add Patient Visit
                    </h3>

                    <form method="POST">

                        <label class="form-label">
                            Visit Date
                        </label>

                        <input type="date"
                               name="visit_date"
                               class="form-control"
                               required>

                        <br>

                        <label class="form-label">
                            Doctor Name
                        </label>

                        <input type="text"
                               name="doctor_name"
                               class="form-control"
                               placeholder="Enter Doctor Name"
                               required>

                        <br>

                        <label class="form-label">
                            Diagnosis
                        </label>

                        <input type="text"
                               name="diagnosis"
                               class="form-control"
                               placeholder="Enter Diagnosis"
                               required>

                        <br>

                        <label class="form-label">
                            Doctor Notes
                        </label>

                        <textarea name="notes"
                                  class="form-control"
                                  rows="4"
                                  placeholder="Enter Notes"></textarea>

                        <br>

                        <button type="submit"
                                class="btn btn-success w-100">
                            💾 Save Visit
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
