<!DOCTYPE html>
<html>
<head>
    <title>Create Token</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">
            🎫 EyeVault Token Management
        </span>
    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg">

                <div class="card-body">

                    <h3 class="text-center mb-4">
                        📞 Create Call / Walk-in Token
                    </h3>

                    <form method="POST">

                        <label class="form-label">
                            Patient Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            placeholder="Enter Patient Name"
                            required>

                        <br>

                        <label class="form-label">
                            Phone Number
                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            placeholder="Enter Phone Number"
                            required>

                        <br>

                        <label class="form-label">
                            Token Source
                        </label>

                        <select
                            name="source"
                            class="form-select">

                            <option value="Call">
                                📞 Call
                            </option>

                            <option value="Walk-in">
                                🚶 Walk-in
                            </option>

                        </select>

                        <br>

                        <button
                            type="submit"
                            class="btn btn-success w-100">

                            🎫 Create Token

                        </button>

                    </form>

                </div>

            </div>

            <div class="text-center mt-3">

                <a href="/staff-dashboard"
                   class="btn btn-secondary">

                    ⬅ Back to Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
