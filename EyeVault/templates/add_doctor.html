<!DOCTYPE html>
<html>
<head>
    <title>Add Doctor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">
            👨‍⚕️ EyeVault - Add Doctor
        </span>
    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="text-center mb-4">
                        Add New Doctor
                    </h3>

                    <form method="POST">

                        <label class="form-label">
                            Doctor Name
                        </label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               placeholder="Enter Doctor Name"
                               required>

                        <br>

                        <label class="form-label">
                            Specialization
                        </label>

                        <input type="text"
                               name="specialization"
                               class="form-control"
                               placeholder="Eye Specialist, Surgeon, etc."
                               required>

                        <br>

                        <label class="form-label">
                            Available Time
                        </label>

                        <input type="text"
                               name="available_time"
                               class="form-control"
                               placeholder="9 AM - 5 PM"
                               required>

                        <br>

                        <button type="submit"
                                class="btn btn-success w-100">
                            💾 Save Doctor
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
