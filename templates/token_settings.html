<!DOCTYPE html>
<html>
<head>
    <title>Token Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">⚙ Token Settings</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-body">
            <h3 class="mb-4">Set Maximum Tokens Per Day</h3>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Max Tokens Per Day</label>
                    <input type="number"
                           name="max_tokens"
                           class="form-control"
                           value="{{ settings.max_tokens_per_day }}"
                           required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Save Token Limit
                </button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
