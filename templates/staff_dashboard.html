```html
<!DOCTYPE html>
<html>
<head>
    <title>Staff Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">
            🏥 EyeVault Staff Dashboard
        </span>
    </div>
</nav>

<div class="container mt-5">

    <div class="row">

        <!-- Search Patient -->
        <div class="col-md-6 mb-4">

            <div class="card shadow-lg h-100">

                <div class="card-body">

                    <h3 class="mb-4">
                        🔍 Search Patient
                    </h3>

                    <form action="/search-patient"
                          method="POST">

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            placeholder="Enter Phone Number"
                            required>

                        <br>

                        <button type="submit"
                                class="btn btn-primary w-100">
                            Search Patient
                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- Quick Actions -->
        <div class="col-md-6 mb-4">

            <div class="card shadow-lg h-100">

                <div class="card-body">

                    <h3 class="mb-4">
                        ⚡ Quick Actions
                    </h3>

                    <div class="d-grid gap-3">

                        <a href="/manual-token"
                           class="btn btn-warning">
                            🎫 Create Call / Walk-in Token
                        </a>

                        <a href="/token-dashboard"
                           class="btn btn-success">
                            📋 View Today's Tokens
                        </a>

                        <a href="/export-tokens"
                           class="btn btn-info">
                            📊 Download Excel Report
                        </a>

                        <a href="/patients"
                           class="btn btn-secondary">
                            👥 View All Patients
                        </a>

                        <a href="/doctors"
                           class="btn btn-primary">
                            👨‍⚕️ Doctors List
                        </a>

                        <a href="/add-doctor"
                           class="btn btn-dark">
                            ➕ Add Doctor
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
```
