<!DOCTYPE html>
<html>
<head>
    <title>Staff Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow mx-auto"
         style="max-width:500px;">

        <div class="card-body">

            <h2 class="text-center mb-4">
                Staff Registration
            </h2>

            <form method="POST">

                <input type="text"
                       name="name"
                       class="form-control"
                       placeholder="Name"
                       required>

                <br>

                <input type="text"
                       name="phone"
                       class="form-control"
                       placeholder="Phone Number"
                       required>

                <br>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Password"
                       required>

                <br>

                <button type="submit"
                        class="btn btn-warning w-100">
                    Register
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
